<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Recetas - Alejandro Haudet</title>
    <style>
        /* ====== ESTILOS OPTIMIZADOS ====== */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; background-color: #fffaf0; color: #333; }
        #view-home { position: fixed; inset: 0; background-image: url('https://images.unsplash.com/photo-1543353071-873f17a7a088?q=80&w=2070&auto-format&fit=crop'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #recipe-counter { position: absolute; top: 20px; right: 20px; font-size: 0.9rem; color: #c0392b; background: rgba(255,255,255,0.6); padding: 5px 12px; border-radius: 15px; font-weight: bold; }
        #view-home h1 { font-size: 3.5rem; color: #c0392b; margin-bottom: 0.2rem; text-shadow: 1px 1px 3px rgba(255,255,255,0.8); }
        #view-home p { font-size: 1.4rem; font-weight: bold; color: #c0392b; text-shadow: 1px 1px 3px rgba(255,255,255,0.8); margin: 5px 0; }
        .pills-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 800px; padding: 20px; }
        .category-pill { padding: 12px 24px; border-radius: 30px; border: none; background-color: #d35400; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .category-pill:hover { background-color: #c0392b; transform: scale(1.05); }
        #view-list { display: none; padding: 40px 20px; max-width: 800px; margin: 0 auto; }
        .recipe-card { border: 1px solid #e0d9cf; background-color: #fffaf0; border-radius: 8px; padding: 20px; margin-bottom: 20px; position: relative; }
        .recipe-title { color: #c0392b; font-size: 1.8em; margin-top: 0; }
        .accordion-title { background-color: #d35400; color: white; border: none; padding: 10px; width: 100%; text-align: left; font-weight: bold; margin-top: 10px; border-radius: 5px; cursor: pointer; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background-color: #fff2e0; border-radius: 5px; }
        .submit-button { background-color: #c0392b; color: white; border: none; padding: 8px 15px; border-radius: 20px; margin-top: 10px; margin-right: 5px; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <section id="view-home">
        <div id="recipe-counter">Cargando...</div>
        <h1>Mis Recetas</h1>
        <p> Un paseo culinario por los sabores de casa Por Alejandro Haudet</p>
        <div id="pills-container" class="pills-container"></div>
       <div style="display: flex; gap: 10px; margin-top: 20px;">
    <a href="glosario.html" class="category-pill" style="text-decoration: none; background-color: #8B4513;">Glosario</a>
</div>
    </section>

    <section id="view-list">
        <button class="submit-button" onclick="window.showHome()" style="background:#7f8c8d; margin-bottom: 20px;">← Volver</button>
        <div id="recipe-results"></div>
    </section>

<script>
    let recipes = [];

    // --- MOTOR DE EXTRACCIÓN DINÁMICA ---
    async function loadData() {
        try {
            // Se agrega timestamp (?v=) para forzar la descarga del JSON más reciente desde GitHub
            const response = await fetch('recetas.json?v=' + new Date().getTime());
            if (!response.ok) throw new Error("No se pudo cargar el archivo");
            recipes = await response.json();
        } catch (e) {
            console.error("Error cargando recetas:", e);
            // Backup por si falla la red: intenta cargar del almacenamiento local
            recipes = JSON.parse(localStorage.getItem('recipes')) || [];
        } finally {
            renderCategories();
            updateCounter();
        }
    }

    function updateCounter() { 
        document.getElementById('recipe-counter').textContent = "Recetas: " + recipes.length; 
    }

    window.showHome = function() {
        document.getElementById('view-list').style.display = 'none';
        document.getElementById('view-home').classList.remove('hidden');
    };

    window.filterBy = function(cat) {
        document.getElementById('view-home').classList.add('hidden');
        document.getElementById('view-list').style.display = 'block';
        const res = document.getElementById('recipe-results');
        res.innerHTML = `<h2>Categoría: ${cat}</h2>`;
        
        const filtered = (cat === 'Todas') ? recipes : recipes.filter(r => r.category && r.category.includes(cat));
        
        filtered.forEach(r => {
            const ing = Array.isArray(r.ingredients) ? r.ingredients : [];
            res.insertAdjacentHTML('beforeend', `
                <article class="recipe-card">
                    <h2 class="recipe-title">${r.title}</h2>
                    <p><strong>Tiempo total:</strong> ${r.totalTime || 'N/A'}</p>
                    <button class="accordion-title" onclick="window.toggleAcc(this)">Ingredientes ▼</button>
                    <div class="accordion-content"><ul>${ing.map(i => `<li>${i}</li>`).join('')}</ul></div>
                    <button class="accordion-title" onclick="window.toggleAcc(this)">Instrucciones ▼</button>
                    <div class="accordion-content"><p style="padding:10px; white-space:pre-line;">${r.instructions}</p></div>
                    ${r.authorComments ? `<p><em>Nota: ${r.authorComments}</em></p>` : ''}
                </article>
            `);
        });
    };

    window.toggleAcc = function(btn) {
        const content = btn.nextElementSibling;
        content.style.maxHeight = content.style.maxHeight ? null : content.scrollHeight + "px";
    };

    function renderCategories() {
        const cats = new Set(['Todas']);
        recipes.forEach(r => r.category && r.category.split(',').forEach(c => cats.add(c.trim())));
        const container = document.getElementById('pills-container');
        container.innerHTML = '';
        cats.forEach(c => {
            const b = document.createElement('button');
            b.className = 'category-pill';
            b.textContent = c;
            b.onclick = () => window.filterBy(c);
            container.appendChild(b);
        });
    }

    // Inicializar carga
    loadData();
</script>
</body>
</html>
