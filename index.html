<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Recetas - Alejandro Haudet</title>
<style>
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: Arial, sans-serif; background-color: #fffaf0; color: #333; }
    
    /* Vista de Inicio */
    #view-home { position: fixed; inset: 0; background-image: url('https://images.unsplash.com/photo-1543353071-873f17a7a088?q=80&w=2070&auto-format&fit=crop'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
    #recipe-counter { position: absolute; top: 20px; right: 20px; font-size: 0.9rem; color: #c0392b; background: rgba(255,255,255,0.6); padding: 5px 12px; border-radius: 15px; font-weight: bold; }
    .hero-content { background: rgba(255,255,255,0.85); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 90%; }
    h1 { margin: 0; color: #d35400; font-size: 2.5rem; }
    .hero-btn { margin-top: 20px; padding: 15px 30px; font-size: 1.2rem; background-color: #e67e22; color: white; border: none; border-radius: 30px; cursor: pointer; transition: 0.3s; }
    .hero-btn:hover { background-color: #d35400; }

    /* Contenedor Principal */
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; display: none; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    
    /* Filtros */
    #pills-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .category-pill { padding: 8px 16px; border-radius: 20px; border: 2px solid #e67e22; background: white; color: #e67e22; cursor: pointer; font-weight: bold; }
    .category-pill.active { background: #e67e22; color: white; }

    /* Grilla de Recetas */
    .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .recipe-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; position: relative; }
    .recipe-card:hover { transform: translateY(-5px); }
    .recipe-img { width: 100%; height: 200px; object-fit: cover; background-color: #f39c12; display: flex; align-items: center; justify-content: center; color: white; font-size: 3rem; }
    .recipe-info { padding: 15px; }
    .recipe-title { margin: 0 0 10px; font-size: 1.25rem; color: #2c3e50; }
    
    /* Botones de Administración (OCULTOS POR DEFECTO) */
    .admin-only { display: none; }
    .btn-add { background: #27ae60; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; }
    .card-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
    .btn-edit { background: #f1c40f; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    .btn-delete { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

    /* Modal de Receta */
    #recipe-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
    .modal-content { background: white; width: 100%; max-width: 800px; max-height: 90vh; border-radius: 15px; overflow-y: auto; padding: 30px; position: relative; }
    .close-modal { position: absolute; top: 15px; right: 15px; font-size: 2rem; cursor: pointer; color: #95a5a6; }
</style>
</head>
<body>

    <div id="view-home">
        <div id="recipe-counter">Cargando recetas...</div>
        <div class="hero-content">
            <h1>Mis Recetas Especiales</h1>
            <p>Una colección personal de sabores y secretos culinarios</p>
            <button class="hero-btn" onclick="showGallery()">Ver Recetario</button>
            <div style="margin-top: 15px;">
                <a href="glosario.html" style="text-decoration: none; color: #d35400; font-weight: bold;">Ver Glosario de Especias</a>
            </div>
        </div>
    </div>

    <div id="view-gallery" class="container">
        <div class="header">
            <h2>Explorar Sabores</h2>
            <button class="btn-add admin-only" onclick="openEditModal()">+ Agregar Nueva</button>
        </div>
        
        <div id="pills-container"></div>
        <div id="recipe-grid" class="recipe-grid"></div>
    </div>

    <div id="recipe-modal">
        <div class="modal-content" id="modal-body">
            </div>
    </div>

<script>
    let recipes = [];
    let isAdmin = false;

    // 1. CHEQUEO DE SEGURIDAD (ADMINISTRADOR)
    function checkAdminStatus() {
        const params = new URLSearchParams(window.location.search);
        isAdmin = params.get('admin') === 'true';
        
        // Aplicar visibilidad de elementos admin
        const adminElements = document.querySelectorAll('.admin-only');
        adminElements.forEach(el => {
            el.style.display = isAdmin ? 'inline-block' : 'none';
        });
    }

    // 2. CARGA DE DATOS
    async function loadData() {
        try {
            // Intentar cargar de GitHub
            const response = await fetch('recetas.json');
            const githubData = await response.json();
            
            // Cargar de LocalStorage (para tus ediciones locales rápidas)
            const localData = JSON.parse(localStorage.getItem('recipes')) || [];
            
            // Combinar (evitando duplicados por ID)
            const allRecipes = [...githubData];
            localData.forEach(local => {
                const index = allRecipes.findIndex(r => r.id === local.id);
                if(index === -1) allRecipes.push(local);
                else allRecipes[index] = local; // Prioriza local si estás editando
            });

            recipes = allRecipes;
            updateCounter();
            checkAdminStatus(); // Verificar admin después de cargar todo
        } catch (e) {
            console.error("Error cargando recetas:", e);
        }
    }

    function updateCounter() {
        document.getElementById('recipe-counter').textContent = `${recipes.length} Recetas Disponibles`;
    }

    // 3. NAVEGACIÓN
    function showGallery() {
        document.getElementById('view-home').style.display = 'none';
        document.getElementById('view-gallery').style.display = 'block';
        renderPills();
        filterBy('Todas');
    }

    function renderPills() {
        const cats = new Set(['Todas']);
        recipes.forEach(r => {
            if(r.category) r.category.split(',').forEach(c => cats.add(c.trim()));
        });
        
        const container = document.getElementById('pills-container');
        container.innerHTML = '';
        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'category-pill';
            btn.textContent = cat;
            btn.onclick = () => filterBy(cat);
            container.appendChild(btn);
        });
    }

    function filterBy(category) {
        const filtered = category === 'Todas' 
            ? recipes 
            : recipes.filter(r => r.category && r.category.includes(category));
        
        const grid = document.getElementById('recipe-grid');
        grid.innerHTML = '';
        
        filtered.forEach(r => {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.innerHTML = `
                <div class="recipe-img">${r.imageUrl ? `<img src="${r.imageUrl}" style="width:100%;height:100%;object-fit:cover">` : '🍳'}</div>
                <div class="recipe-info">
                    <h3 class="recipe-title">${r.title}</h3>
                    <p style="font-size:0.8rem;color:#7f8c8d;">${r.category}</p>
                    <button class="hero-btn" style="padding:5px 15px; font-size:0.9rem;" onclick="viewRecipe('${r.id}')">Ver Receta</button>
                </div>
                ${isAdmin ? `
                <div class="card-actions">
                    <button class="btn-edit" onclick="event.stopPropagation(); openEditModal('${r.id}')">✏️</button>
                    <button class="btn-delete" onclick="event.stopPropagation(); deleteRecipe('${r.id}')">🗑️</button>
                </div>` : ''}
            `;
            grid.appendChild(card);
        });
    }

    // 4. FUNCIONES DE VISTA Y EDICIÓN
    window.viewRecipe = function(id) {
        const r = recipes.find(rec => String(rec.id) === String(id));
        const modal = document.getElementById('recipe-modal');
        const body = document.getElementById('modal-body');
        
        body.innerHTML = `
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 style="color:#d35400;">${r.title}</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:20px; background:#f9f9f9; padding:15px; border-radius:10px;">
                <p><strong>Prep:</strong> ${r.prepTime}</p>
                <p><strong>Cocción:</strong> ${r.cookTime}</p>
                <p><strong>Total:</strong> ${r.totalTime}</p>
                <p><strong>Categoría:</strong> ${r.category}</p>
            </div>
            <h3>Ingredientes</h3>
            <ul>${r.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
            <h3>Instrucciones</h3>
            <p style="white-space: pre-line;">${r.instructions}</p>
            ${r.authorComments ? `<div style="margin-top:20px; padding:15px; background:#fff3e0; border-left:5px solid #e67e22; font-style:italic;">${r.authorComments}</div>` : ''}
        `;
        modal.style.display = 'flex';
    };

    window.closeModal = function() {
        document.getElementById('recipe-modal').style.display = 'none';
    };

    // (Aquí irían las funciones de openEditModal y deleteRecipe que ya tenías, 
    // pero protegidas por el isAdmin si quisieras editar desde la web)

    window.onload = loadData;
</script>
</body>
</html>
