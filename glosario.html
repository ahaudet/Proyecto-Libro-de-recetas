<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glosario de Especias - A. Haudet</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji" rel="stylesheet">
<style>
/* ====== TUS ESTILOS BASE ORIGINALES ====== */
body { font-family: Arial,"Noto Color Emoji",sans-serif; margin:0; padding:0; background-color:#fffaf0; color:#333;}
h1,h2,h3 {margin:0.5em 0;}
button {cursor:pointer;}
.main-content {max-width:800px; margin:20px auto; padding:0 10px;}

.html-index {background-color:#fcf8ec; border:1px solid #e0d9cf; border-radius:8px; padding:15px; margin-bottom:20px;}
.html-index h2 {color:#8B4513; margin-top:0;}
.html-index ul {list-style-type:none; padding:0; margin:0; columns:2;}
.html-index li a {color:#8B4513; text-decoration:none; font-weight:bold; display:flex; align-items:center; padding:5px 0;}
.item-icon {margin-right:8px; font-size:1.1em; position:relative; min-width: 25px; display: inline-block;}

.spice-card {background-color:#fdf5e6; border:1px solid #e0d9cf; border-left:5px solid #e67e22; border-radius:8px; padding:20px; margin-bottom:20px; display: none;} 
.spice-title {color:#d35400; font-size:1.8em; margin-bottom:10px;}
.accordion-title {background-color:#c0392b; color:white; border:none; padding:12px 15px; width:100%; text-align:left; font-weight:bold; margin-top:10px; border-radius:5px; box-sizing:border-box; font-size:1em;}
.accordion-content {max-height:0; overflow:hidden; transition:max-height 0.3s ease-out,padding 0.3s ease-out; background-color:#fff2e0; padding:0 15px; border-radius:0 0 5px 5px;}

.submit-button { background-color:#27ae60; color:white; border:none; padding: 6px 12px; border-radius:20px; font-size: 0.9em; transition:background-color 0.2s; text-decoration: none; display: inline-block; }

/* SEGURIDAD: Botones admin ocultos */
.admin-only { display: none; }

#modalOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
#modalForm { background-color: #fffaf0; border-radius: 10px; padding: 20px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
.form-group { margin-bottom: 10px; }
.form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
</style>
</head>
<body>

<main class="main-content">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <a href="index.html" class="submit-button" style="background-color: #c0392b;">Volver</a>
    <h2 style="color:#8B4513; margin:0;">Especias y Hierbas</h2>
    <button id="addBtn" class="submit-button admin-only" onclick="openModal()">+ Agregar</button>
  </div>

  <section class="html-index" id="main-index">
    <h2>Índice de Especias</h2>
    <p>Hacé clic en una especia para ver su ficha técnica.</p>
    <ul id="spice-index"></ul>
  </section>

  <section id="content-list"></section>
</main>

<div id="modalOverlay">
  <div id="modalForm">
    <button style="float:right;" onclick="closeModal()">Cerrar ✕</button>
    <h2 id="modalTitle">Nueva Especia</h2>
    <div style="background-color: #fce4d6; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d35400;">
        <textarea id="form-import-json" rows="2" placeholder="Pegá el JSON de Gemini..."></textarea>
        <button onclick="aplicarImportacion()" class="submit-button" style="background-color: #d35400; width: 100%; margin-top:5px;">Cargar Datos</button>
    </div>
    <form id="spice-form">
      <div class="form-group"><label>Nombre:</label><input type="text" id="f-title" required></div>
      <div class="form-group"><label>Categoría:</label><select id="f-category">
          <option value="picante">Picante</option><option value="herbal">Herbal</option><option value="dulce">Dulce</option>
          <option value="mezcla">Mezcla</option><option value="aromatico">Aromático</option>
      </select></div>
      <div class="form-group"><label>Intro Corta:</label><textarea id="f-intro"></textarea></div>
      <div class="form-group"><label>Origen:</label><textarea id="f-sec1"></textarea></div>
      <div class="form-group"><label>Perfil:</label><textarea id="f-sec2"></textarea></div>
      <div class="form-group"><label>Uso Técnico:</label><textarea id="f-sec3"></textarea></div>
      <button type="submit" class="submit-button" style="width:100%;">Guardar Especia</button>
    </form>
  </div>
</div>

<script>
let allSpices = [];
let isAdmin = false;

// TUS ESPECIAS INICIALES (ESTÁTICAS)
const initialSpices = [
  { id:"spice_anis_estrellado", title:"Anís Estrellado", flag:"🇨🇳", category:"aromatico", introduction:"Fruto del Illicium verum...", sections:[{title:"Origen y Geografía", content:"..."}, {title:"Perfil Sensorial", content:"..."}, {title:"Aplicación Técnica", content:"..."}] },
  // ... (Aquí podrías poner el resto de tus especias fijas)
];

function checkAdmin() {
    const params = new URLSearchParams(window.location.search);
    isAdmin = params.get('admin') === 'true';
    if (isAdmin) {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-block');
    }
}

function cargarEspecias() {
    const guardadas = JSON.parse(localStorage.getItem('mis_especias_idea')) || [];
    allSpices = [...initialSpices, ...guardadas];
    renderIndex();
    renderCards();
    checkAdmin();
}

function renderIndex(){
    const index = document.getElementById("spice-index");
    index.innerHTML = "";
    [...allSpices].sort((a,b) => a.title.localeCompare(b.title)).forEach(sp => {
        index.insertAdjacentHTML("beforeend", `<li><a href="javascript:void(0)" onclick="showSpice('${sp.id}')">
            <span class="item-icon">${getCategoryIcon(sp.category)}</span>${sp.flag} ${sp.title}</a></li>`);
    });
}

function renderCards(){
    const list = document.getElementById("content-list");
    list.innerHTML = "";
    allSpices.forEach(sp => {
        list.insertAdjacentHTML("beforeend", `
            <article class="spice-card" id="${sp.id}">
                <a href="javascript:void(0)" onclick="showIndex()" style="color:#c0392b; font-weight:bold;">⬅ Volver</a>
                <h2 class="spice-title">${sp.flag} ${sp.title}</h2>
                <p><em>${sp.introduction}</em></p>
                ${sp.sections.map(s => `<button class="accordion-title">${s.title}</button><div class="accordion-content"><p>${s.content}</p></div>`).join("")}
                <div class="admin-only" style="margin-top:20px; display: ${isAdmin ? 'block' : 'none'}">
                    <button class="submit-button" onclick="openModal('${sp.id}')" style="background:#3498db">Editar</button>
                    <button class="submit-button" onclick="borrarEspecia('${sp.id}')" style="background:#7f8c8d">Borrar</button>
                </div>
            </article>
        `);
    });
}

function getCategoryIcon(cat){
    switch(cat){
        case "picante": return "🌶️"; case "herbal": return "🌿"; case "dulce": return "🍯";
        case "mezcla": return "🧂"; case "aromatico": return "🌸"; default: return "🍃";
    }
}

function showSpice(id) {
    document.getElementById('main-index').style.display = 'none';
    document.getElementById(id).style.display = 'block';
    window.scrollTo(0,0);
}

function showIndex() {
    document.querySelectorAll('.spice-card').forEach(c => c.style.display = 'none');
    document.getElementById('main-index').style.display = 'block';
}

document.addEventListener("click", e => {
    if(e.target.classList.contains("accordion-title")){
        const panel = e.target.nextElementSibling;
        panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
    }
});

function openModal(id = null) {
    document.getElementById("modalOverlay").style.display = "flex";
    // ... Lógica de edición que ya tenías
}

function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }

cargarEspecias();
</script>
</body>
</html>
