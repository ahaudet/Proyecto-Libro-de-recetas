<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glosario de Especias - A. Haudet</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji" rel="stylesheet">
<style>
/* ====== TUS ESTILOS ORIGINALES ====== */
body { font-family: Arial,"Noto Color Emoji",sans-serif; margin:0; padding:0; background-color:#fffaf0; color:#333;}
h1,h2,h3 {margin:0.5em 0;}
button {cursor:pointer;}
.main-content {max-width:800px; margin:20px auto; padding:0 10px;}

.html-index {background-color:#fcf8ec; border:1px solid #e0d9cf; border-radius:8px; padding:15px; margin-bottom:20px;}
.html-index h2 {color:#8B4513; margin-top:0;}
.html-index ul {list-style-type:none; padding:0; margin:0; columns:2; -webkit-columns:2; -moz-columns:2;}
.html-index li a {color:#8B4513; text-decoration:none; font-weight:bold; display:flex; align-items:center; padding:5px 0;}
.item-icon {margin-right:8px; font-size:1.1em; position:relative; min-width: 25px; display: inline-block;}

.spice-card {background-color:#fdf5e6; border:1px solid #e0d9cf; border-left:5px solid #e67e22; border-radius:8px; padding:20px; margin-bottom:20px; display: none;} 
.spice-title {color:#d35400; font-size:1.8em; margin-bottom:10px;}
.accordion-title {background-color:#c0392b; color:white; border:none; padding:12px 15px; width:100%; text-align:left; font-weight:bold; margin-top:10px; border-radius:5px; box-sizing:border-box; font-size:1em;}
.accordion-content {max-height:0; overflow:hidden; transition:max-height 0.3s ease-out,padding 0.3s ease-out; background-color:#fff2e0; padding:0 15px; border-radius:0 0 5px 5px;}

.submit-button { background-color:#27ae60; color:white; border:none; padding: 6px 12px; border-radius:20px; font-size: 0.9em; cursor:pointer; transition:background-color 0.2s; text-decoration: none; display: inline-block; }

/* SEGURIDAD: Clase Admin */
.admin-only { display: none; }

#modalOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
#modalForm { background-color: #fffaf0; border-radius: 10px; padding: 20px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
.form-group { margin-bottom: 10px; }
.form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
</style>
</head>
<body>

<main class="main-content">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <a href="index.html" class="submit-button" style="background-color: #c0392b;">Volver</a>
    <h2 style="color:#8B4513; margin:0; text-align: center;">Especias y Hierbas</h2>
    <button id="addBtn" class="submit-button admin-only" onclick="openModal()">+ Agregar</button>
  </div>

  <section class="html-index" id="main-index">
    <h2>Índice de Especias</h2>
    <p>Hacé clic en una especia para ver su ficha técnica.</p>
    <ul id="spice-index"></ul>
  </section>

  <section id="content-list"></section>
</main>

<div id="modalOverlay">
  <div id="modalForm">
    <button style="float:right;" onclick="closeModal()">Cerrar ✕</button>
    <h2 id="modalTitle">Nueva Especia</h2>
    <div style="background-color: #fce4d6; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d35400;">
        <label><strong>Importar desde Gemini:</strong></label>
        <textarea id="form-import-json" rows="2" placeholder="Pegá el JSON..."></textarea>
        <button onclick="aplicarImportacion()" class="submit-button" style="margin-top:5px; background-color:#d35400; width:100%;">Cargar Datos</button>
    </div>
    <form id="spice-form">
      <div class="form-group"><label>Nombre:</label><input type="text" id="f-title" required></div>
      <div class="form-group"><label>Categoría:</label><select id="f-category">
          <option value="picante">Picante</option><option value="herbal">Herbal</option><option value="dulce">Dulce</option><option value="mezcla">Mezcla</option><option value="aromatico">Aromático</option>
      </select></div>
      <div class="form-group"><label>Intro:</label><textarea id="f-intro"></textarea></div>
      <div class="form-group"><label>Origen:</label><textarea id="f-sec1"></textarea></div>
      <div class="form-group"><label>Perfil:</label><textarea id="f-sec2"></textarea></div>
      <div class="form-group"><label>Uso:</label><textarea id="f-sec3"></textarea></div>
      <button type="submit" class="submit-button" style="width:100%;">Guardar</button>
    </form>
  </div>
</div>

<script>
// LAS 21 ESPECIAS ORIGINALES RESTAURADAS
const initialSpices = [
  { id:"spice_anis_estrellado", title:"Anís Estrellado", flag:"🇨🇳", category:"aromatico", introduction:"Fruto del Illicium verum, valorado por su alto contenido en anetol.", sections:[{title:"Origen y Geografía", content:"Nativo del suroeste de China y el norte de Vietnam."}, {title:"Perfil Sensorial y Químico", content:"Sabor dulce y licoroso. Contiene ácido shikímico."}, {title:"Aplicación Técnica", content:"Indispensable en caldos largos y el polvo de cinco especias chino."}] },
  { id:"spice_baharat", title:"Bahārāt", flag:"🌍", category:"mezcla", introduction:"Mezcla maestra de especias del Medio Oriente y el Norte de África.", sections:[{title:"Origen y Geografía", content:"Originaria de la región del Golfo Pérsico y el Levante."}, {title:"Perfil Sensorial y Químico", content:"Equilibrio entre el picante de la pimienta y la calidez de la canela."}, {title:"Aplicación Técnica", content:"Para marinar carnes de cordero y aromatizar arroces pilaf."}] },
  { id:"spice_canela", title:"Canela", flag:"🇱🇰", category:"dulce", introduction:"Corteza interna desecada de árboles del género Cinnamomum.", sections:[{title:"Origen y Geografía", content:"La variedad auténtica (Ceilán) proviene de Sri Lanka."}, {title:"Perfil Sensorial y Químico", content:"Rica en cinamaldehído. La Cassia es más robusta y picante."}, {title:"Aplicación Técnica", content:"Equilibrio de acidez en salsas de tomate y repostería."}] },
  { id:"spice_cardamomo", title:"Cardamomo", flag:"🇮🇳", category:"herbal", introduction:"Conocido como la 'Reina de las Especias' por su aroma sofisticado.", sections:[{title:"Origen y Geografía", content:"Originario de las selvas tropicales de los Montes Cardamomo, India."}, {title:"Perfil Sensorial y Químico", content:"Notas de eucalipto, cítricos y alcanfor. Muy volátil."}, {title:"Aplicación Técnica", content:"Moler al momento para infusiones de café o repostería."}] },
  { id:"spice_cayena", title:"Cayena", flag:"🇬🇫", category:"picante", introduction:"Chile en polvo con una pungencia limpia y directa.", sections:[{title:"Origen y Geografía", content:"Lleva el nombre de la ciudad de Cayena, en la Guayana Francesa."}, {title:"Perfil Sensorial y Químico", content:"Contiene capsaicina pura. Rango de 30k a 50k SHU."}, {title:"Aplicación Técnica", content:"Potenciador de calor en mariscos y salsas emulsionadas."}] },
  { id:"spice_cilantro_fresco", title:"Cilantro Fresco", flag:"🇲🇽", category:"herbal", introduction:"Hojas frescas de Coriandrum sativum, de perfil cítrico.", sections:[{title:"Origen y Geografía", content:"Mediterráneo oriental y Cáucaso. Pilar en México y Sudeste Asiático."}, {title:"Perfil Sensorial y Químico", content:"Contiene aldehídos cítricos. Muy volátil al calor."}, {title:"Aplicación Técnica", content:"Uso crudo en ceviches, guacamoles y currys verdes."}] },
  { id:"spice_clavo", title:"Clavo de Olor", flag:"🇮🇩", category:"dulce", introduction:"Botones florales secos del árbol Syzygium aromaticum.", sections:[{title:"Origen y Geografía", content:"Nativo de las Islas Molucas en Indonesia."}, {title:"Perfil Sensorial y Químico", content:"Concentración extrema de eugenol. Aroma penetrante."}, {title:"Aplicación Técnica", content:"Indispensable en charcutería y fondos de cocción."}] },
  { id:"spice_coriandro", title:"Coriandro", flag:"🌍", category:"herbal", introduction:"Semilla desecada de la planta de cilantro, perfil amaderado.", sections:[{title:"Origen y Geografía", content:"Nativo del Mediterráneo oriental."}, {title:"Perfil Sensorial y Químico", content:"Notas de limón y salvia. Rico en linalool."}, {title:"Aplicación Técnica", content:"Base para masalas y fundamental en cervezas Witbier."}] },
  { id:"spice_curry", title:"Curry", flag:"🇮🇳", category:"mezcla", introduction:"Mezcla compleja que representa la identidad regional de la India.", sections:[{title:"Origen y Geografía", content:"Sur de la India (Tamil Nadu)."}, {title:"Perfil Sensorial y Químico", content:"Dominado por la cúrcuma y el fenogreco. Perfil terroso."}, {title:"Aplicación Técnica", content:"Activación en materia grasa (tarka) para liberar aromas."}] },
  { id:"spice_garam_masala", title:"Garam Masala", flag:"🇮🇳", category:"mezcla", introduction:"'Mezcla caliente' diseñada para potenciar el metabolismo.", sections:[{title:"Origen y Geografía", content:"Norte de la India y Pakistán (Punjab)."}, {title:"Perfil Sensorial y Químico", content:"Más dulce y punzante que el curry; sin cúrcuma."}, {title:"Aplicación Técnica", content:"Se añade al final para preservar aromas volátiles."}] },
  { id:"spice_jengibre", title:"Jengibre", flag:"🇮🇳", category:"herbal", introduction:"Rizoma articulado con un potente perfil picante.", sections:[{title:"Origen y Geografía", content:"Regiones tropicales del sudeste asiático e India."}, {title:"Perfil Sensorial y Químico", content:"Contiene gingerol (fresco) y shogaoles (seco)."}, {title:"Aplicación Técnica", content:"Marinadas para ablandar fibras y repostería."}] },
  { id:"spice_kashmiri", title:"Kashmiri Masala", flag:"🇮🇳", category:"picante", introduction:"Chile valorado por su color rojo profundo y calor moderado.", sections:[{title:"Origen y Geografía", content:"Región de Cachemira, India."}, {title:"Perfil Sensorial y Químico", content:"Pigmentación intensa sin exceso de capsaicina."}, {title:"Aplicación Técnica", content:"Clave en platos estéticos como el Pollo Tandoori."}] },
  { id:"spice_merken", title:"Merkén", flag:"🇨🇱", category:"picante", introduction:"Condimento ancestral del pueblo Mapuche.", sections:[{title:"Origen y Geografía", content:"Región de la Araucanía, Chile."}, {title:"Perfil Sensorial y Químico", content:"Ahumado de chile cacho de cabra y coriandro."}, {title:"Aplicación Técnica", content:"Costras de pescado y aceites de acabado."}] },
  { id:"spice_paprika", title:"Páprika", flag:"🇭🇺", category:"dulce", introduction:"Pimiento molido, pilar de la cocina centroeuropea.", sections:[{title:"Origen y Geografía", content:"Originaria de América, perfeccionada en Hungría."}, {title:"Perfil Sensorial y Químico", content:"Sensible al calor (se amarga). Variedades dulces y picantes."}, {title:"Aplicación Técnica", content:"Fundamental en Goulash y platos de color intenso."}] },
  { id:"spice_pimienta_blanca", title:"Pimienta Blanca", flag:"🌍", category:"picante", introduction:"Semilla de Piper nigrum sin el pericarpio exterior.", sections:[{title:"Origen y Geografía", content:"Sudeste asiático (Vietnam, Indonesia)."}, {title:"Perfil Sensorial y Químico", content:"Más picante pero menos aromática que la negra."}, {title:"Aplicación Técnica", content:"Estética en salsas claras (bechamel) y purés."}] },
  { id:"spice_pimienta_negra", title:"Pimienta Negra", flag:"🌍", category:"picante", introduction:"Fruto inmaduro fermentado y secado del Piper nigrum.", sections:[{title:"Origen y Geografía", content:"Costa de Malabar, India."}, {title:"Perfil Sensorial y Químico", content:"Contiene piperina. Aroma amaderado y punzante."}, {title:"Aplicación Técnica", content:"Molienda al momento para preservar aceites volátiles."}] },
  { id:"spice_pimienta_rosa", title:"Pimienta Rosa", flag:"🇧🇷", category:"aromatico", introduction:"Falsa pimienta (Schinus terebinthifolius).", sections:[{title:"Origen y Geografía", content:"Nativa de América del Sur (Brasil, Argentina)."}, {title:"Perfil Sensorial y Químico", content:"Resinosa, dulce y frutal. Muy poco picante."}, {title:"Aplicación Técnica", content:"Pescados delicados y coctelería premium."}] },
  { id:"spice_ras_el_hanout", title:"Ras el Hanout", flag:"🇲🇦", category:"mezcla", introduction:"La mezcla más compleja del mercado marroquí.", sections:[{title:"Origen y Geografía", content:"Marruecos. Significa 'la cabeza de la tienda'."}, {title:"Perfil Sensorial y Químico", content:"Floral y cálido. Hasta 30 ingredientes distintos."}, {title:"Aplicación Técnica", content:"Estofados en Tajine y preparación de Cuscús."}] },
  { id:"spice_shichimi", title:"Shichimi Togarashi", flag:"🇯🇵", category:"picante", introduction:"Mezcla japonesa de siete sabores para equilibrio umami.", sections:[{title:"Origen y Geografía", content:"Japón (Periodo Edo)."}, {title:"Perfil Sensorial y Químico", content:"Contraste entre chile, piel de mandarina y alga nori."}, {title:"Aplicación Técnica", content:"Acabado de mesa para sopas ramen y carnes."}] },
  { id:"spice_tahini", title:"Tahini", flag:"🇱🇧", category:"mezcla", introduction:"Pasta oleaginosa de sésamo tostado.", sections:[{title:"Origen y Geografía", content:"Medio Oriente (Levante)."}, {title:"Perfil Sensorial y Químico", content:"Sabor a nuez tostada, amargo sutil. Rico en sesamina."}, {title:"Aplicación Técnica", content:"Base para Hummus y salsas de sésamo."}] },
  { id:"spice_zaatar", title:"Z'atar", flag:"🇱🇧", category:"mezcla", introduction:"Mezcla herbaria de hospitalidad árabe.", sections:[{title:"Origen y Geografía", content:"Líbano, Siria y Palestina."}, {title:"Perfil Sensorial y Químico", content:"Ácido por el sumac y terroso por el tomillo."}, {title:"Aplicación Técnica", content:"Con aceite de oliva sobre pan o costras de cordero."}] }
];

let allSpices = [];
let isAdmin = false;
let currentEditId = null;

// GESTIÓN DE DATOS Y SEGURIDAD
function checkAdmin() {
    const params = new URLSearchParams(window.location.search);
    isAdmin = params.get('admin') === 'true';
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdmin ? 'inline-block' : 'none');
}

function cargarEspecias() {
    const guardadas = JSON.parse(localStorage.getItem('mis_especias_idea')) || [];
    const idsGuardadas = guardadas.map(g => g.id);
    const inicialesFiltradas = initialSpices.filter(i => !idsGuardadas.includes(i.id));
    allSpices = [...inicialesFiltradas, ...guardadas];
    renderIndex();
    renderCards();
    checkAdmin();
}

function renderIndex(){
    const index = document.getElementById("spice-index");
    index.innerHTML = "";
    [...allSpices].sort((a,b) => a.title.localeCompare(b.title)).forEach(sp => {
        index.insertAdjacentHTML("beforeend", `<li><a href="javascript:void(0)" onclick="showSpice('${sp.id}')">
            <span class="item-icon">${getCategoryIcon(sp.category)}</span>${sp.flag} ${sp.title}</a></li>`);
    });
}

function renderCards(){
    const list = document.getElementById("content-list");
    list.innerHTML = "";
    allSpices.forEach(sp => {
        list.insertAdjacentHTML("beforeend", `
            <article class="spice-card" id="${sp.id}">
                <a href="javascript:void(0)" onclick="showIndex()" style="color:#c0392b; font-weight:bold; text-decoration:none;">⬅ Volver al Índice</a>
                <h2 class="spice-title">${sp.flag} ${sp.title}</h2>
                <p><em>${sp.introduction}</em></p>
                ${sp.sections.map(s => `<button class="accordion-title">${s.title}</button><div class="accordion-content"><p>${s.content}</p></div>`).join("")}
                <div class="admin-only" style="margin-top:20px; display: ${isAdmin ? 'block' : 'none'}">
                    <button class="submit-button" onclick="openModal('${sp.id}')" style="background:#3498db">Editar Ficha</button>
                    <button class="submit-button" onclick="borrarEspecia('${sp.id}')" style="background:#7f8c8d">Borrar</button>
                </div>
            </article>
        `);
    });
}

function getCategoryIcon(cat){
    switch(cat){
        case "picante": return "🌶️"; case "herbal": return "🌿"; case "dulce": return "🍯";
        case "mezcla": return "🧂"; case "aromatico": return "🌸"; default: return "🍃";
    }
}

// FUNCIONES DE VISTA
function showSpice(id) {
    document.querySelectorAll('.spice-card').forEach(c => c.style.display = 'none');
    document.getElementById('main-index').style.display = 'none';
    document.getElementById(id).style.display = 'block';
    window.scrollTo(0,0);
}

function showIndex() {
    document.querySelectorAll('.spice-card').forEach(c => c.style.display = 'none');
    document.getElementById('main-index').style.display = 'block';
}

// ACORDEÓN
document.getElementById("content-list").addEventListener("click", e => {
    if(e.target.classList.contains("accordion-title")){
        const panel = e.target.nextElementSibling;
        panel.style.maxHeight = panel.style.maxHeight ? null : panel.scrollHeight + "px";
    }
});

// MODAL Y GESTIÓN (IDÉNTICO A TU ORIGINAL)
function openModal(id = null) {
    currentEditId = id;
    document.getElementById("modalOverlay").style.display = "flex";
    document.getElementById("spice-form").reset();
    if(id) {
        const sp = allSpices.find(s => s.id === id);
        document.getElementById("f-title").value = sp.title;
        document.getElementById("f-category").value = sp.category;
        document.getElementById("f-intro").value = sp.introduction;
        document.getElementById("f-sec1").value = sp.sections[0]?.content || "";
        document.getElementById("f-sec2").value = sp.sections[1]?.content || "";
        document.getElementById("f-sec3").value = sp.sections[2]?.content || "";
    }
}

function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }

document.getElementById("spice-form").onsubmit = e => {
    e.preventDefault();
    const nueva = {
        id: currentEditId || "spice_" + Date.now(),
        title: document.getElementById("f-title").value,
        flag: "🌍", // Por defecto
        category: document.getElementById("f-category").value,
        introduction: document.getElementById("f-intro").value,
        sections: [
            { title: "Origen y Geografía", content: document.getElementById("f-sec1").value },
            { title: "Perfil Sensorial y Químico", content: document.getElementById("f-sec2").value },
            { title: "Aplicación Técnica", content: document.getElementById("f-sec3").value }
        ]
    };
    let guardadas = JSON.parse(localStorage.getItem('mis_especias_idea')) || [];
    guardadas = guardadas.filter(g => g.id !== nueva.id);
    guardadas.push(nueva);
    localStorage.setItem('mis_especias_idea', JSON.stringify(guardadas));
    cargarEspecias();
    closeModal();
};

function borrarEspecia(id) {
    if(confirm("¿Borrar?")) {
        let guardadas = JSON.parse(localStorage.getItem('mis_especias_idea')) || [];
        guardadas = guardadas.filter(g => g.id !== id);
        localStorage.setItem('mis_especias_idea', JSON.stringify(guardadas));
        cargarEspecias();
        showIndex();
    }
}

cargarEspecias();
</script>
</body>
</html>
