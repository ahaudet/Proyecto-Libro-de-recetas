<script>
    let allSpices = [];

    // --- MOTOR DE CARGA DESDE ESPECIAS.JSON ---
    async function loadGlosario() {
        try {
            // Se agrega timestamp para asegurar que siempre cargue la última versión de tu base de datos
            const response = await fetch('especias.json?v=' + new Date().getTime());
            if (!response.ok) throw new Error("Fallo en la recepción de la base de datos de especias");
            
            allSpices = await response.json();
        } catch (e) {
            console.error("Error técnico en la carga:", e);
            // Backup por si falla la red: carga del almacenamiento local que usa tu botón 'Agregar'
            allSpices = JSON.parse(localStorage.getItem('mis_especias_idea')) || [];
        } finally {
            document.getElementById("spice-count").innerText = `${allSpices.length} ítems`;
            renderIndex();
            renderCards();
        }
    }

    function getCategoryIcon(cat) {
        const icons = { picante: "🌶️", aromatico: "🌸", dulce: "🍯", herbal: "🌿", mezcla: "🧂" };
        return icons[cat] || "🍃";
    }

    function renderIndex() {
    const index = document.getElementById("spice-index");
    index.innerHTML = "";
    // Ordenamos alfabéticamente para que el usuario encuentre rápido el reactivo sensorial
    allSpices.sort((a,b) => a.title.localeCompare(b.title)).forEach(sp => {
        const icon = getCategoryIcon(sp.category);
        const flag = sp.flag || "🏳️"; // Fallback técnico
        index.insertAdjacentHTML("beforeend", `
            <li>
                <a href="javascript:void(0)" onclick="window.showSpice('${sp.id}')" style="text-decoration:none; color:#8B4513; display:flex; align-items:center; padding:5px 0;">
                    <span class="item-icon" style="margin-right:10px;">${icon}</span> ${flag} ${sp.title}
                </a>
            </li>
        `);
    });
}
    function renderCards() {
        const list = document.getElementById("content-list");
        list.innerHTML = "";
        allSpices.forEach(sp => {
            const sections = sp.sections.map(s => `
                <button class="accordion-title" onclick="window.toggleAcc(this)">${s.title} ▼</button>
                <div class="accordion-content"><p>${s.content}</p></div>
            `).join("");

            list.insertAdjacentHTML("beforeend", `
                <article class="spice-card" id="${sp.id}" style="display:none;">
                    <button onclick="showIndex()" style="background:none; border:none; color:#c0392b; font-weight:bold; cursor:pointer; margin-bottom:15px;">⬅ Volver al Índice</button>
                    <h3 style="color:#d35400; margin-top:0;">${sp.flag} ${sp.title}</h3>
                    <p><em>${sp.introduction}</em></p>
                    ${sections}
                    <div style="margin-top:20px; display: flex; gap: 10px;">
                        <button onclick="editarEspecia('${sp.id}')" class="submit-button" style="background-color:#2980b9;">Editar</button>
                        <button onclick="eliminarEspecia('${sp.id}')" class="submit-button" style="background-color:#c0392b;">Borrar</button>
                    </div>
                </article>
            `);
        });
    }

    // --- LÓGICA DE INTERFAZ ---
    window.toggleAcc = function(btn) {
        const content = btn.nextElementSibling;
        content.style.maxHeight = content.style.maxHeight ? null : content.scrollHeight + "px";
    };

    window.showSpice = function(id) {
        document.getElementById("main-index").style.display = "none";
        document.getElementById(id).style.display = "block";
        window.scrollTo(0,0);
    };

    window.showIndex = function() {
        document.querySelectorAll(".spice-card").forEach(c => c.style.display = "none");
        document.getElementById("main-index").style.display = "block";
    };

    // Inicializar el sistema
    loadGlosario();
</script>
