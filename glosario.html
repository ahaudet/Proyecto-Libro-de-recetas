<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glosario de Especias - Alejandro Haudet</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
    <style>
        /* ====== ESTILOS REFINADOS ====== */
        body { font-family: Arial, "Noto Color Emoji", sans-serif; margin: 0; padding: 0; background-color: #fffaf0; color: #333; line-height: 1.6; }
        .main-content { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        /* Encabezado */
        .header-container { display: flex; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #8B4513; padding-bottom: 10px; }
        .header-title { color: #8B4513; margin: 0; flex-grow: 1; text-align: center; font-size: 1.8rem; }
        .btn-back { background-color: #7f8c8d; color: white; border: none; padding: 8px 18px; border-radius: 20px; text-decoration: none; font-size: 0.9em; font-weight: bold; transition: 0.3s; }
        .btn-back:hover { background-color: #34495e; }

        /* Índice */
        .html-index { background-color: #fcf8ec; border: 1px solid #e0d9cf; border-radius: 12px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .html-index h2 { color: #8B4513; margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        #spice-count { font-size: 0.6em; color: #7f8c8d; background: #eee; padding: 4px 12px; border-radius: 15px; }
        
        #spice-index { list-style: none; padding: 0; margin: 15px 0 0 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        #spice-index li a { color: #8B4513; text-decoration: none; font-weight: bold; display: flex; align-items: center; padding: 8px; border-radius: 6px; transition: 0.2s; }
        #spice-index li a:hover { background-color: #f3e5ab; }
        .item-icon { margin-right: 10px; font-size: 1.2em; }

        /* Tarjetas de Especias */
        .spice-card { background-color: #fdf5e6; border: 1px solid #e0d9cf; border-left: 6px solid #e67e22; border-radius: 8px; padding: 25px; margin-top: 10px; display: none; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-index { background: none; border: 1px solid #c0392b; color: #c0392b; padding: 5px 12px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .btn-index:hover { background: #c0392b; color: white; }

        .accordion-title { background-color: #d35400; color: white; border: none; padding: 12px 15px; width: 100%; text-align: left; font-weight: bold; margin-top: 12px; border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background-color: #fff2e0; border-radius: 0 0 5px 5px; }
        .accordion-content p { padding: 15px; margin: 0; white-space: pre-line; }

        .loading-msg { text-align: center; color: #7f8c8d; padding: 20px; }
    </style>
</head>
<body>

<main class="main-content">
    <div class="header-container">
        <a href="index.html" class="btn-back">← Volver</a>
        <h2 class="header-title">Glosario de Especias</h2>
    </div>

    <section class="html-index" id="main-index">
        <h2>Índice <span id="spice-count">Cargando...</span></h2>
        <ul id="spice-index"></ul>
    </section>

    <div id="content-list">
        <!-- Las tarjetas se generan aquí -->
    </div>
</main>

<script>
    let allSpices = [];

    async function loadGlosario() {
        const countEl = document.getElementById("spice-count");
        try {
            // Fetch optimizado para evitar caché agresivo
            const response = await fetch('especias.json?v=' + Date.now());
            if (!response.ok) throw new Error("No se pudo cargar el archivo JSON");
            
            allSpices = await response.json();
            
            if (allSpices.length === 0) {
                countEl.innerText = "0 ítems";
            } else {
                renderAll();
            }
        } catch (e) {
            console.error("Error:", e);
            countEl.innerText = "Error al cargar";
            document.getElementById("spice-index").innerHTML = `<p class="loading-msg">Asegúrate de que 'especias.json' esté en la misma carpeta y tenga el formato correcto.</p>`;
        }
    }

    function renderAll() {
        document.getElementById("spice-count").innerText = `${allSpices.length} ítems`;
        renderIndex();
        renderCards();
    }

    function getCategoryIcon(cat) {
        const icons = { picante: "🌶️", aromatico: "🌸", dulce: "🍯", herbal: "🌿", mezcla: "🧂" };
        return icons[cat.toLowerCase()] || "🍃";
    }

    function renderIndex() {
        const index = document.getElementById("spice-index");
        index.innerHTML = "";
        // Orden alfabético por título
        allSpices.sort((a,b) => a.title.localeCompare(b.title)).forEach(sp => {
            const icon = getCategoryIcon(sp.category || "");
            index.insertAdjacentHTML("beforeend", `
                <li>
                    <a href="javascript:void(0)" onclick="showSpice('${sp.id}')">
                        <span class="item-icon">${icon}</span> ${sp.flag || ''} ${sp.title}
                    </a>
                </li>
            `);
        });
    }

    function renderCards() {
        const list = document.getElementById("content-list");
        list.innerHTML = "";
        allSpices.forEach(sp => {
            const sections = sp.sections.map(s => `
                <button class="accordion-title" onclick="toggleAcc(this)">${s.title} <span>▼</span></button>
                <div class="accordion-content"><p>${s.content}</p></div>
            `).join("");
            
            list.insertAdjacentHTML("beforeend", `
                <article class="spice-card" id="${sp.id}">
                    <button onclick="showIndex()" class="btn-index">⬅ Volver al Índice</button>
                    <h3 style="color:#d35400; font-size: 2rem; margin: 10px 0;">${sp.flag || ''} ${sp.title}</h3>
                    <p style="font-size: 1.1rem; color: #555;"><em>${sp.introduction}</em></p>
                    ${sections}
                </article>`);
        });
    }

    window.toggleAcc = function(btn) {
        const content = btn.nextElementSibling;
        const icon = btn.querySelector('span');
        if (content.style.maxHeight) {
            content.style.maxHeight = null;
            icon.innerText = "▼";
        } else {
            content.style.maxHeight = content.scrollHeight + "px";
            icon.innerText = "▲";
        }
    }

    window.showSpice = function(id) {
        document.getElementById("main-index").style.display = "none";
        document.querySelectorAll(".spice-card").forEach(c => c.style.display = "none");
        const target = document.getElementById(id);
        if (target) {
            target.style.display = "block";
            window.scrollTo(0,0);
        }
    }

    window.showIndex = function() {
        document.querySelectorAll(".spice-card").forEach(c => c.style.display = "none");
        document.getElementById("main-index").style.display = "block";
    }

    // Iniciar carga al abrir
    loadGlosario();
</script>
</body>
</html>
